<div class="posts-wrapper">
  <nav class="navbar">
    <span class="nav-brand"><i class="bi bi-bluesky"></i> Antigram</span>
    <div class="nav-links">
      <a (click)="router.navigate(['/profile'])">Perfil <i class="bi bi-person-heart"></i></a>
      <button (click)="auth.logout()">Salir <i class="bi bi-escape"></i></button>
    </div>
  </nav>

  <div class="posts-container">

    <!-- Crear publicación -->
    <div class="crear-post">
      <h3><i class="bi bi-pencil-square"></i> Nueva publicación</h3>
      <input type="text" [(ngModel)]="nuevoPost.titulo" placeholder="Título" class="input-field" />
      <textarea [(ngModel)]="nuevoPost.descripcion" placeholder="¿Qué estás pensando?" rows="3" class="input-field"></textarea>
      <div class="crear-footer">
        <label class="file-btn">
          <i class="bi bi-image"></i> {{ postFileName || 'Agregar imagen' }}
          <input type="file" accept="image/*" (change)="onPostFile($event)" hidden />
        </label>
        <button class="btn-publicar" (click)="crearPost()" [disabled]="creando || !nuevoPost.titulo || !nuevoPost.descripcion">
          @if (creando) { <span class="spinner"></span> } @else { Publicar }
        </button>
      </div>
    </div>

    <!-- Ordenamiento y paginación -->
    <div class="toolbar">
      <div class="orden-btns">
        <button [class.active]="orden === 'fecha'" (click)="cambiarOrden('fecha')">
          <i class="bi bi-calendar"></i> Más recientes
        </button>
        <button [class.active]="orden === 'likes'" (click)="cambiarOrden('likes')">
          <i class="bi bi-heart"></i> Más populares
        </button>
      </div>
      <span class="paginacion-info">{{ paginaActual }} / {{ totalPaginas }}</span>
    </div>

    <!-- Lista de posts -->
    @if (loading) {
      <div class="loading"><span class="spinner-dark"></span> Cargando...</div>
    } @else {
      @for (post of posts; track post._id) {
        <app-post-card [post]="post" (deleted)="onDeleted($event)" (liked)="onLiked($event)" />
      }
      @if (posts.length === 0) {
        <div class="empty">No hay publicaciones todavía. ¡Sé el primero!</div>
      }
    }

    <!-- Paginación -->
    <div class="paginacion">
      <button (click)="paginaAnterior()" [disabled]="offset === 0">
        <i class="bi bi-chevron-left"></i> Anterior
      </button>
      <button (click)="paginaSiguiente()" [disabled]="offset + limit >= total">
        Siguiente <i class="bi bi-chevron-right"></i>
      </button>
    </div>

  </div>
</div>

<app-modal [visible]="modal.visible" [message]="modal.message" [type]="modal.type" />
